<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Souplesse — Admin Dashboard</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap"/>
  <style>
    .admin-container { display: flex; gap: 0; min-height: 100vh; }
    .admin-sidebar { width: 260px; background: #2c4a5a; padding: 24px; color: white; overflow-y: auto; }
    .admin-main { flex: 1; overflow-y: auto; padding: 40px; background: #fdfcfa; }
    .admin-logo { font-size: 18px; font-weight: 600; margin-bottom: 32px; }
    .admin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .admin-stat-card { background: white; padding: 20px; border-radius: 6px; text-align: center; }
    .admin-stat-num { font-size: 28px; font-weight: 600; color: #2c4a5a; }
    .admin-stat-label { font-size: 12px; color: #999; margin-top: 4px; }
    .admin-tabs { display: flex; gap: 12px; margin-bottom: 32px; border-bottom: 1px solid #e0e0e0; }
    .admin-tab { padding: 12px 16px; cursor: pointer; border: none; background: none; font-size: 14px; color: #999; border-bottom: 3px solid transparent; transition: all 0.2s; }
    .admin-tab.active { color: #2c4a5a; border-bottom-color: #2c4a5a; font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .admin-card-body { background: white; padding: 24px; border-radius: 8px; }
    .admin-card-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #2c4a5a; }
    .admin-form-group { margin-bottom: 16px; }
    .admin-form-group label { display: block; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
    .admin-form-group input, .admin-form-group select, .admin-form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    .admin-form-error { color: #d32f2f; font-size: 12px; }
    .admin-submit-btn { width: 100%; padding: 12px; background: #6b9eaf; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .admin-table th { text-align: left; padding: 12px; background: #f5f5f5; font-weight: 600; font-size: 12px; color: #666; border-bottom: 1px solid #ddd; }
    .admin-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    .admin-btn-edit, .admin-btn-delete { border: none; background: none; cursor: pointer; padding: 4px; border-radius: 2px; transition: all 0.2s; }
    .admin-btn-edit { color: #2196f3; }
    .admin-btn-delete { color: #f44336; }
    .admin-btn-edit:hover { background: rgba(33, 150, 243, 0.1); }
    .admin-btn-delete:hover { background: rgba(244, 67, 54, 0.1); }
    #adminToast { display: none; position: fixed; bottom: 20px; left: 20px; background: #4caf50; color: white; padding: 12px 20px; border-radius: 4px; }
    #adminToast.show { display: block; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  </style>
</head>
<body>

<div class="admin-container">

  <!-- SIDEBAR -->
  <div class="admin-sidebar">
    <div class="admin-logo">SOUPLESSE ADMIN</div>
    <div class="sidebar-footer"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="admin-main">
    <!-- STATS -->
    <div class="admin-stats">
      <div class="admin-stat-card">
        <div class="admin-stat-num" id="statActive">0</div>
        <div class="admin-stat-label">CLASSES ACTIVES</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-num" id="statBooked">0</div>
        <div class="admin-stat-label">RÉSERVATIONS</div>
      </div>
      <div class="admin-stat-card">
        <div class="admin-stat-num" id="statClients">0</div>
        <div class="admin-stat-label">CLIENTS</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('courses')">Classes</button>
      <button class="admin-tab" onclick="switchTab('instructors')">Instructeurs</button>
      <button class="admin-tab" onclick="switchTab('reservations')">Réservations</button>
    </div>

    <!-- TAB: COURSES -->
    <div id="courses-tab" class="tab-content active">
      <div class="admin-card-body" id="addCourseSection">
        <h3 class="admin-card-title">Créer une Classe</h3>

        <div class="admin-form-group">
            <label for="fieldTitle">Type de Classe (ex: YOGA, PILATES)</label>
            <input type="text" id="fieldTitle" placeholder="ex. YOGA, PILATES, STRETCHING, CARDIO"/>
        </div>

        <div class="admin-form-group">
            <label for="fieldInstructor">Instructeur</label>
            <select id="fieldInstructor">
              <option value="">— Choisir un instructeur —</option>
            </select>
        </div>

        <div class="form-row">
            <div class="admin-form-group">
              <label for="fieldDate">Date</label>
              <input type="date" id="fieldDate"/>
            </div>
            <div class="admin-form-group">
              <label for="fieldTime">Heure</label>
              <input type="time" id="fieldTime"/>
            </div>
        </div>

        <div class="admin-form-group">
            <label for="fieldCapacity">Capacité (Places)</label>
            <input type="number" id="fieldCapacity" placeholder="8" min="1" max="50"/>
        </div>

        <div class="admin-form-group">
            <label for="fieldImage">Image (URL, optionnel)</label>
            <input type="url" id="fieldImage" placeholder="https://images.unsplash.com/..."/>
        </div>

        <div class="admin-form-group">
            <label for="fieldDescription">Description</label>
            <textarea id="fieldDescription" placeholder="Décrivez la séance…" rows="4"></textarea>
        </div>

        <div class="admin-form-group">
            <label for="fieldPrice">Prix (DA)</label>
            <input type="number" id="fieldPrice" min="0" step="100"/>
        </div>

        <p class="admin-form-error" id="adminFormError"></p>

        <button class="admin-submit-btn" onclick="addCourse()">
            Publier la Classe →
        </button>
      </div>

      <div style="margin-top: 32px;">
        <h3 class="admin-card-title">Classes Publiées</h3>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Type</th>
              <th>Instructeur</th>
              <th>Date & Heure</th>
              <th>Prix</th>
              <th>Places</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminTableBody">
          </tbody>
        </table>
        <div id="emptyState" style="text-align: center; padding: 32px; color: #999; display: none;">
          Aucune classe ajoutée.
        </div>
      </div>
    </div>

    <!-- TAB: INSTRUCTORS -->
    <div id="instructors-tab" class="tab-content">
      <div class="admin-card-body">
        <h3 class="admin-card-title">Ajouter un Instructeur</h3>

        <div class="admin-form-group">
            <label for="instFirstName">Prénom</label>
            <input type="text" id="instFirstName" placeholder="ex. Amira"/>
        </div>

        <div class="admin-form-group">
            <label for="instLastName">Nom</label>
            <input type="text" id="instLastName" placeholder="ex. Bensalem"/>
        </div>

        <div class="admin-form-group">
            <label for="instEmail">Email</label>
            <input type="email" id="instEmail" placeholder="amira@souplesse.com"/>
        </div>

        <p class="admin-form-error" id="instructorFormError"></p>

        <button class="admin-submit-btn" onclick="addInstructor()">
            Ajouter Instructeur →
        </button>
      </div>

      <div style="margin-top: 32px;">
        <h3 class="admin-card-title">Instructeurs</h3>
        <div id="instructorsContainer"></div>
      </div>
    </div>

    <!-- TAB: RESERVATIONS -->
    <div id="reservations-tab" class="tab-content">
      <div style="margin-top: 0;">
        <h3 class="admin-card-title">Réservations</h3>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Client</th>
              <th>Email</th>
              <th>Classe</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="clientsTableBody">
          </tbody>
        </table>
        <div id="clientsEmptyState" style="text-align: center; padding: 32px; color: #999; display: none;">
          Aucune réservation.
        </div>
      </div>
    </div>

  </div>
</div>

<div id="adminToast"></div>

<script src="./js/api.js"></script>
<script src="./js/admin.js"></script>

</body>
</html>
