<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souplesse — Oups !</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/ui.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400&display=swap">
    <style>
        body {
            background: var(--deep);
            color: var(--cream);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            margin: 0;
            overflow: hidden;
        }
        /* Sublte animated background */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(107, 158, 175, 0.15) 0%, transparent 50%);
            animation: drift 20s linear infinite;
            z-index: -1;
        }
        @keyframes drift {
            0% { transform: translate(-10%, -10%); }
            50% { transform: translate(10%, 10%); }
            100% { transform: translate(-10%, -10%); }
        }
        .error-container {
            max-width: 600px;
            position: relative;
            z-index: 1;
        }
        .error-code {
            font-family: var(--serif);
            font-size: clamp(120px, 20vw, 240px);
            line-height: 0.8;
            background: linear-gradient(to bottom, var(--sand), var(--ocean));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.3;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            letter-spacing: -0.05em;
            pointer-events: none;
            font-weight: 300;
        }
        .content-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 56px 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.3);
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .error-icon {
            font-family: var(--serif);
            font-size: 32px;
            color: var(--sand);
            margin-bottom: 24px;
            letter-spacing: 0.2em;
        }
        h1 {
            font-family: var(--serif);
            font-weight: 300;
            font-size: clamp(32px, 5vw, 42px);
            margin-bottom: 20px;
            line-height: 1.1;
        }
        p {
            font-size: 16px;
            color: rgba(245, 240, 232, 0.7);
            line-height: 1.7;
            margin-bottom: 44px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .btn-home {
            display: inline-block;
            padding: 16px 48px;
            background: var(--ocean);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 10px;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid transparent;
        }
        .btn-home:hover {
            background: transparent;
            border-color: var(--sand);
            color: var(--sand);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(107, 158, 175, 0.2);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code" id="code-bg">404</div>
        <div class="content-box">
            <div class="error-icon">SOUPLESSE</div>
            <h1 id="error-title">Page Introuvable</h1>
            <p id="error-desc">
                Désolé, la page que vous recherchez n'existe pas ou a été déplacée. 
                Veuillez retourner à l'accueil pour continuer votre séance.
            </p>
            <a href="/" class="btn-home">Retour à l'accueil</a>
        </div>
    </div>

    <script>
        // Perfecting the display based on context
        const path = window.location.pathname;
        if (path.includes('500') || path.includes('error')) {
            document.getElementById('code-bg').innerText = '500';
            document.getElementById('error-title').innerText = 'Erreur Serveur';
            document.getElementById('error-desc').innerText = 'Notre système rencontre une difficulté technique. Nos équipes ont été alertées, nous revenons vers vous rapidement.';
        }
    </script>
</body>
</html>
