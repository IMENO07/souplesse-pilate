spring:
  application:
    name: souplesse-pilates
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/souplesse_pilates}
    username: ${SPRING_DATASOURCE_USERNAME:pilates_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pilates_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
  sql:
    init:
      mode: never
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:imene7905@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:gxstwinuubgmxhsb}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0
        cachecontrol:
          no-store: true
          must-revalidate: true

server:
  port: ${SERVER_PORT:8080}

app:
  mail:
    from: ${APP_MAIL_FROM:imene7905@gmail.com}          
    studio-name: ${APP_MAIL_STUDIO_NAME:"Souplesse Pilates Studio"}