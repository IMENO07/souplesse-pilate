# Souplesse Pilates - Local Development Compose

services:
  app:
    build: .
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/souplesse_pilates
      - SPRING_DATASOURCE_USERNAME=pilates_user
      - SPRING_DATASOURCE_PASSWORD=pilates_pass
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod,seed-running}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=souplesse_pilates
      - POSTGRES_USER=pilates_user
      - POSTGRES_PASSWORD=pilates_pass
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilates_user -d souplesse_pilates"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

volumes:
  postgres_data_test:
